name: Auto Increment Version

on:
  push:
    branches:
      - main

jobs:
  increment-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Increment patch version
        run: |
          echo "📦 Récupération de la version actuelle..."
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Version actuelle: $CURRENT_VERSION"
          
          # Retirer -SNAPSHOT si présent
          VERSION_BASE=${CURRENT_VERSION%-SNAPSHOT}
          
          # Séparer major.minor.patch
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_BASE"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          # Incrémenter le patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "🚀 Nouvelle version: $NEW_VERSION"
          
          # Mettre à jour le pom.xml
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
          
          # Vérifier si des changements ont été faits
          if [[ -n $(git status -s) ]]; then
            echo "✅ Commit de la nouvelle version..."
            git add pom.xml
            git commit -m "🔖 Bump version to $NEW_VERSION [skip ci]"
            git push
          
            echo "🏷️ Création du tag v$NEW_VERSION..."
            git tag -a "v$NEW_VERSION" -m "Release version $NEW_VERSION"
            git push origin "v$NEW_VERSION"
          
            echo "🎉 Version incrémentée avec succès: $NEW_VERSION"
          else
            echo "ℹ️ Aucun changement de version nécessaire"
          fi
