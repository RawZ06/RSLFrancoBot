name: Auto Increment Version

on:
  push:
    branches:
      - main

jobs:
  increment-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Process version and create release
        run: |
          echo "📦 Fetching current version..."
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current version: $CURRENT_VERSION"
          
          # Check if version ends with -SNAPSHOT
          if [[ ! "$CURRENT_VERSION" =~ -SNAPSHOT$ ]]; then
            echo "⚠️ Current version is not a SNAPSHOT version. Skipping release process."
            exit 0
          fi
          
          # Remove -SNAPSHOT to get release version
          RELEASE_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          echo "🚀 Release version: $RELEASE_VERSION"
          
          # Step 1: Set release version (remove -SNAPSHOT)
          echo "📝 Setting release version $RELEASE_VERSION..."
          mvn versions:set -DnewVersion=$RELEASE_VERSION -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "🔖 Release version $RELEASE_VERSION [skip ci]"
          git push
          
          # Step 2: Create and push tag
          echo "🏷️ Creating tag v$RELEASE_VERSION..."
          git tag -a "v$RELEASE_VERSION" -m "Release version $RELEASE_VERSION"
          git push origin "v$RELEASE_VERSION"
          
          # Step 3: Prepare next development version
          IFS='.' read -ra VERSION_PARTS <<< "$RELEASE_VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          # Increment patch for next development version
          NEXT_PATCH=$((PATCH + 1))
          NEXT_DEV_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"
          
          echo "🔧 Preparing next development version: $NEXT_DEV_VERSION"
          mvn versions:set -DnewVersion=$NEXT_DEV_VERSION -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "🔧 Prepare next development version $NEXT_DEV_VERSION [skip ci]"
          git push
          
          echo "✅ Release process completed!"
          echo "   - Released: $RELEASE_VERSION"
          echo "   - Next dev: $NEXT_DEV_VERSION"