name: Auto Increment Version

on:
  push:
    branches:
      - main

jobs:
  increment-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Increment patch version
        run: |
          echo "📦 Fetching current version..."
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Current version: $CURRENT_VERSION"
          
          # Remove -SNAPSHOT if present
          VERSION_BASE=${CURRENT_VERSION%-SNAPSHOT}
          
          # Split major.minor.patch
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION_BASE"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          
          # Increment patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "🚀 New version: $NEW_VERSION"
          
          # Update pom.xml
          mvn versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false
          
          # Check if changes were made
          if [[ -n $(git status -s) ]]; then
            echo "✅ Committing new version..."
            git add pom.xml
            git commit -m "🔖 Bump version to $NEW_VERSION [skip ci]"
            git push
          
            echo "🏷️ Creating tag v$NEW_VERSION..."
            git tag -a "v$NEW_VERSION" -m "Release version $NEW_VERSION"
            git push origin "v$NEW_VERSION"
          
            echo "🎉 Version successfully incremented to: $NEW_VERSION"
          else
            echo "ℹ️ No version change required"
          fi

      - name: Trigger Dokploy Deployment
        run: |
            curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"